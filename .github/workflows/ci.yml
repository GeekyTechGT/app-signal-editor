name: CI

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master
  workflow_dispatch:

jobs:
  linux-core:
    name: Linux Core and Tests
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y ninja-build g++ clang cmake

      - name: Configure GCC debug
        run: cmake --preset linux-gcc-debug -DSIGNAL_EDITOR_BUILD_GUI=OFF

      - name: Build GCC debug
        run: cmake --build --preset linux-gcc-debug --parallel

      - name: Run GCC tests
        run: ctest --preset linux-gcc-debug --output-on-failure

      - name: Configure Clang debug
        run: cmake --preset linux-clang-debug -DSIGNAL_EDITOR_BUILD_GUI=OFF

      - name: Build Clang debug
        run: cmake --build --preset linux-clang-debug --parallel

  windows-core:
    name: Windows Core and Tests
    runs-on: windows-2022

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup MSVC developer shell
        uses: ilammy/msvc-dev-cmd@v1

      - name: Configure MSVC debug
        shell: pwsh
        run: cmake -S . -B build/windows-actions-msvc-debug -G "Visual Studio 17 2022" -A x64 -DSIGNAL_EDITOR_BUILD_GUI=OFF -DSIGNAL_EDITOR_BUILD_TESTS=ON -DSIGNAL_EDITOR_BUILD_SHARED=ON -DCMAKE_CONFIGURATION_TYPES=Debug

      - name: Build MSVC debug
        shell: pwsh
        run: cmake --build build/windows-actions-msvc-debug --config Debug --parallel

      - name: Run MSVC tests
        shell: pwsh
        run: ctest --test-dir build/windows-actions-msvc-debug --build-config Debug --output-on-failure
